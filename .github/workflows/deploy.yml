name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            # Go to app directory (created on first deploy)
            mkdir -p /var/www/greenscapes-va
            cd /var/www/greenscapes-va

            # Pull latest code
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/juancjara-oss/greenscapes.git .
            fi

            # Install dependencies and build
            npm ci --omit=dev
            npm run build

            # Start or restart with PM2
            if pm2 list | grep -q "greenscapes-va"; then
              pm2 restart greenscapes-va
            else
              pm2 start npm --name "greenscapes-va" -- start -- -p 3000
              pm2 save
            fi

            echo "✅ Deployment complete"
