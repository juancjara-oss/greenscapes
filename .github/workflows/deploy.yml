name: Deploy to Contabo VPS

on:
  push:
    branches:
      - main
  schedule:
    # Every Monday at 9:00 AM Eastern Time (13:00 UTC)
    - cron: '0 13 * * 1'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  deploy:
    name: Build & Deploy Static Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avzr --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            out/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/greenscapes-va/

      - name: Fix permissions & reload Nginx
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "find /var/www/greenscapes-va -type d -exec chmod 755 {} \; && \
             find /var/www/greenscapes-va -type f -exec chmod 644 {} \; && \
             chown -R www-data:www-data /var/www/greenscapes-va && \
             systemctl reload nginx && \
             echo '✅ Deploy completo'"
